{% extends "base.html" %}
{% block title %}Edit Address Space — IP Manager{% endblock %}

{% block content %}
<div class="card" style="max-width:600px">
  <div class="card-header">
    <div class="card-title">Edit Address Space — {{ space.name }}</div>
  </div>
  <div class="card-body">
    <form method="POST">
      <div class="form-group">
        <label>Name</label>
        <input type="text" name="name" class="form-control" value="{{ space.name }}" required />
      </div>
      <div class="form-group">
        <label>Description</label>
        <input type="text" name="description" class="form-control" value="{{ space.description or '' }}" placeholder="Optional description" />
      </div>
      <div class="form-actions">
        <button type="submit" class="btn btn-primary">Save changes</button>
        <a href="{{ url_for('main.index') }}" class="btn btn-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
