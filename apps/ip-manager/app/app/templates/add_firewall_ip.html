{% extends "base.html" %}
{% block title %}Add Firewall IP — IP Manager{% endblock %}

{% block content %}
<div class="card" style="max-width:600px">
  <div class="card-header">
    <div class="card-title">Add Firewall External IP</div>
  </div>
  <div class="card-body">
    <form method="POST">
      <div class="form-grid">
        <div class="form-group">
          <label>Public IP</label>
          <input type="text" name="public_ip" class="form-control" placeholder="203.0.113.10" required />
        </div>
        <div class="form-group">
          <label>Label</label>
          <input type="text" name="label" class="form-control" placeholder="e.g. Prod NAT IP" required />
        </div>
        <div class="form-group">
          <label>Mapped to service</label>
          <input type="text" name="mapped_to_service" class="form-control" placeholder="e.g. app-prod" />
        </div>
        <div class="form-group">
          <label>Firewall rule reference</label>
          <input type="text" name="firewall_rule_ref" class="form-control" placeholder="e.g. FW-NAT-001" />
        </div>
      </div>
      <div class="form-group">
        <label>Notes</label>
        <input type="text" name="notes" class="form-control" placeholder="Any additional notes" />
      </div>
      <div class="form-actions">
        <button type="submit" class="btn btn-primary">Add Firewall IP</button>
        <a href="{{ url_for('main.index') }}" class="btn btn-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
