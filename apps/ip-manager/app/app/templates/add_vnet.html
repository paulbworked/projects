{% extends "base.html" %} {% block title %}Add {{ resource_type }} — IP
Manager{% endblock %} {% block content %}
<div class="card" style="max-width: 700px">
  <div class="card-header">
    <div class="card-title">Add {{ resource_type }}</div>
  </div>
  <div class="card-body">
    <form method="POST">
      <div class="form-grid">
        <div class="form-group">
          <label>Name</label>
          <input
            type="text"
            name="name"
            class="form-control"
            placeholder="{% if resource_type == 'VPN' %}vpn-prod-uksouth{% elif resource_type == 'vWAN' %}vwan-hub-uksouth{% else %}vnet-prod-uksouth{% endif %}"
            required
          />
        </div>
        <div class="form-group">
          <label>Environment</label>
          <select name="environment" class="form-control">
            <option value="ops">ops</option>
            <option value="prod">prod</option>
            <option value="dev">dev</option>
            <option value="unq">unq</option>
            <option value="qual">qual</option>
            <option value="val">val</option>
            <option value="dr">dr</option>
            <option value="poc">poc</option>
            <option value="nonprod">nonprod</option>
          </select>
        </div>
        <div class="form-group">
          <label>Region</label>
          <input
            type="text"
            name="region"
            class="form-control"
            placeholder="UK South"
          />
        </div>
        <div class="form-group">
          <label>Resource group</label>
          <input
            type="text"
            name="resource_group"
            class="form-control"
            placeholder="rg-network"
          />
        </div>
        <div class="form-group">
          <label>Service</label>
          <input
            type="text"
            name="service"
            class="form-control"
            placeholder="e.g. Operations, Axion, OPRA"
          />
        </div>
        <div class="form-group">
          <label>Address Space</label>
          <select name="address_space_id" class="form-control" required>
            {% for space in address_spaces %}
            <option value="{{ space.id }}">
              {{ space.name }} ({{ space.cidr }})
            </option>
            {% endfor %}
          </select>
        </div>
      </div>

      <!-- Dynamic CIDR fields -->
      <div class="form-group" style="margin-top: 0.5rem">
        <label>Address spaces (CIDRs)</label>
        <div id="cidr-list">
          <div
            class="cidr-row"
            style="display: flex; gap: 8px; margin-bottom: 8px"
          >
            <input
              type="text"
              name="cidr"
              class="form-control"
              placeholder="e.g. 10.1.0.0/16"
              style="flex: 1"
            />
            <button
              type="button"
              class="btn btn-danger btn-sm remove-cidr"
              style="display: none"
            >
              Remove
            </button>
          </div>
        </div>
        <button
          type="button"
          id="add-cidr"
          class="btn btn-secondary btn-sm"
          style="margin-top: 4px"
        >
          + Add another CIDR
        </button>
        <div style="font-size: 11px; color: #6c757d; margin-top: 4px">
          Maximum 10 CIDRs
        </div>
      </div>

      <div class="form-actions">
        <button type="submit" class="btn btn-primary">
          Add {{ resource_type }}
        </button>
        <a href="{{ url_for('main.index') }}" class="btn btn-secondary"
          >Cancel</a
        >
      </div>
    </form>
  </div>
</div>

<script>
  const maxCidrs = 10;

  function updateRemoveButtons() {
    const rows = document.querySelectorAll(".cidr-row");
    rows.forEach((row) => {
      row.querySelector(".remove-cidr").style.display =
        rows.length > 1 ? "inline-flex" : "none";
    });
    document.getElementById("add-cidr").style.display =
      rows.length >= maxCidrs ? "none" : "inline-flex";
  }

  document.getElementById("add-cidr").addEventListener("click", () => {
    const rows = document.querySelectorAll(".cidr-row");
    if (rows.length >= maxCidrs) return;

    const row = document.createElement("div");
    row.className = "cidr-row";
    row.style.cssText = "display:flex;gap:8px;margin-bottom:8px";
    row.innerHTML = `
      <input type="text" name="cidr" class="form-control" placeholder="e.g. 10.2.0.0/16" style="flex:1" />
      <button type="button" class="btn btn-danger btn-sm remove-cidr">Remove</button>
    `;
    row.querySelector(".remove-cidr").addEventListener("click", () => {
      row.remove();
      updateRemoveButtons();
    });
    document.getElementById("cidr-list").appendChild(row);
    updateRemoveButtons();
  });

  document.querySelectorAll(".remove-cidr").forEach((btn) => {
    btn.addEventListener("click", () => {
      btn.closest(".cidr-row").remove();
      updateRemoveButtons();
    });
  });

  updateRemoveButtons();
</script>
{% endblock %}
