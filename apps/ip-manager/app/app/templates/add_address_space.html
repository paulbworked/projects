{% extends "base.html" %}
{% block title %}Add Address Space — IP Manager{% endblock %}

{% block content %}
<div class="card" style="max-width:600px">
  <div class="card-header">
    <div class="card-title">Add Address Space</div>
  </div>
  <div class="card-body">
    <form method="POST">
      <div class="form-group">
        <label>Name</label>
        <input type="text" name="name" class="form-control" placeholder="e.g. Azure Core Network" required />
      </div>
      <div class="form-group">
        <label>Description</label>
        <input type="text" name="description" class="form-control" placeholder="Optional description" />
      </div>
      <div class="form-actions">
        <button type="submit" class="btn btn-primary">Add Address Space</button>
        <a href="{{ url_for('main.index') }}" class="btn btn-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
