{% extends "base.html" %}
{% block title %}Add IP Address — IP Manager{% endblock %}

{% block content %}
<div class="card" style="max-width:600px">
  <div class="card-header">
    <div class="card-title">Add IP Address</div>
  </div>
  <div class="card-body">
    <form method="POST">
      <div class="form-grid">
        <div class="form-group">
          <label>IP Address</label>
          <input type="text" name="address" class="form-control" placeholder="10.1.1.4" required />
        </div>
        <div class="form-group">
          <label>Service name</label>
          <input type="text" name="service_name" class="form-control" placeholder="jumpbox-prod" required />
        </div>
      </div>
      <div class="form-group">
        <label>Description</label>
        <input type="text" name="description" class="form-control" placeholder="Optional description" />
      </div>
      <div class="form-group">
        <label>Subnet</label>
        <select name="subnet_id" class="form-control" required>
          {% for subnet in subnets %}
          <option value="{{ subnet.id }}">{{ subnet.name }} ({{ subnet.cidr }}) — {{ subnet.vnet.name }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-actions">
        <button type="submit" class="btn btn-primary">Add IP Address</button>
        <a href="{{ url_for('main.index') }}" class="btn btn-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
