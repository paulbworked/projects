<body>
    <h1>ConfigMap Commands</h1>
    <p>
        Stores non confidential data in key value pairs
    </p>
    <h4>Look at the configmap environment configuration:</h4>
    <p>
        <code>
            kubectl get configmap -n ingress<br>
            kubectl describe configmap ingress-nginx-controller -n ingress
        </code>
    </p>
</body>
