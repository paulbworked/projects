<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Events Commands</title>
</head>
<body>
    <h1>Events Commands</h1>
    <h4>Check ALL in namespace:</h4>
    <p>
        <code>
            kubectl get events -n dev2-opra
        </code>
    <h4>Check events of pod in namespace:</h4>
    <p>
        <code>
            kubectl describe pod pgadmin-0 -n dev2-opra
        </code>
    </p>
</body>
</html>
